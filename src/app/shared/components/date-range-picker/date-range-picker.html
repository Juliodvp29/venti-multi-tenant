<div class="relative inline-block">

    <!-- Trigger button -->
    <button type="button" (click)="toggleOpen()"
        class="inline-flex items-center gap-2 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 py-2.5 px-4 text-sm transition-all focus:ring-2 focus:ring-indigo-500 whitespace-nowrap active:scale-[0.98] group"
        [class.ring-2]="open()" [class.ring-indigo-500]="open()" [class.border-indigo-500]="open()">

        <svg xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4 flex-shrink-0 text-gray-400 group-hover:text-indigo-500 transition-colors" fill="none"
            viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
        </svg>

        <span [class.text-gray-900]="displayLabel()" [class.dark:text-white]="displayLabel()"
            [class.text-gray-400]="!displayLabel()" class="font-medium">
            {{ displayLabel() ?? placeholder() }}
        </span>

        @if (value().start) {
        <button type="button" (click)="$event.stopPropagation(); clearRange()"
            class="ml-1 p-0.5 rounded-full text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
        </button>
        }
    </button>

    <!-- Calendar dropdown -->
    @if (open()) {
    <div
        class="absolute right-0 z-50 mt-2 w-72 rounded-2xl bg-white/90 dark:bg-gray-900/95 backdrop-blur-xl shadow-2xl ring-1 ring-black/5 dark:ring-white/10 p-4 animate-in slide-in-from-top-2 duration-300">

        <!-- Month nav -->
        <div class="flex items-center justify-between mb-4">
            <button type="button" (click)="prevMonth()"
                class="p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 dark:text-gray-400 transition-all active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke-width="2.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
                </svg>
            </button>
            <div class="flex flex-col items-center">
                <span class="text-xs font-bold text-indigo-600 dark:text-indigo-400 uppercase tracking-widest">{{
                    viewYear() }}</span>
                <span class="text-sm font-bold text-gray-900 dark:text-white">
                    {{ MONTHS[viewMonth()] }}
                </span>
            </div>
            <button type="button" (click)="nextMonth()"
                class="p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 dark:text-gray-400 transition-all active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke-width="2.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
                </svg>
            </button>
        </div>

        <!-- Weekday headers -->
        <div class="grid grid-cols-7 mb-2">
            @for (wd of WEEKDAYS; track wd) {
            <div
                class="text-center text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase py-1 tracking-tighter">
                {{ wd }}</div>
            }
        </div>

        <!-- Day grid -->
        <div class="grid grid-cols-7 gap-y-1">
            @for (day of calendarDays(); track $index) {
            @if (day === null) {
            <div class="h-8"></div>
            } @else {
            <button type="button" (click)="selectDay(day)" (mouseenter)="hoverDay.set(day)"
                (mouseleave)="hoverDay.set(null)"
                class="relative h-8 w-full flex items-center justify-center text-sm transition-all duration-150 rounded-lg focus:outline-none"
                [class.bg-indigo-600]="isStart(day) || isEnd(day)" [class.text-white]="isStart(day) || isEnd(day)"
                [class.font-bold]="isStart(day) || isEnd(day)" [class.shadow-lg]="isStart(day) || isEnd(day)"
                [class.shadow-indigo-200]="isStart(day) || isEnd(day)"
                [class.dark:shadow-none]="isStart(day) || isEnd(day)" [class.bg-indigo-50]="isInRange(day)"
                [class.dark:bg-indigo-900\/30]="isInRange(day)"
                [class.text-indigo-700]="isInRange(day) && !isStart(day) && !isEnd(day)"
                [class.dark:text-indigo-300]="isInRange(day) && !isStart(day) && !isEnd(day)"
                [class.hover:bg-gray-100]="!isStart(day) && !isEnd(day) && !isInRange(day)"
                [class.dark:hover:bg-gray-800]="!isStart(day) && !isEnd(day) && !isInRange(day)"
                [class.text-gray-700]="!isStart(day) && !isEnd(day)"
                [class.dark:text-gray-300]="!isStart(day) && !isEnd(day)">
                {{ day.split('-')[2] | number:'1.0-0' }}
            </button>
            }
            }
        </div>

        <!-- Hint -->
        <div class="mt-4 pt-3 border-t border-gray-100 dark:border-gray-800">
            <p class="text-center text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest">
                @if (selecting() === 'start') { Selecciona inicio }
                @else { Selecciona fin }
            </p>
        </div>

    </div>
    }

</div>
