<div class="relative inline-block w-full">
    <!-- Trigger button -->
    <button type="button" (click)="toggleOpen()" [disabled]="disabled()"
        class="flex items-center w-full gap-2 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 px-4 py-2.5 text-sm transition-all focus:ring-2 focus:ring-indigo-500 outline-none disabled:opacity-50 disabled:cursor-not-allowed group"
        [class.ring-2]="open()" [class.ring-indigo-500]="open()" [class.border-indigo-500]="open()">

        <svg xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 flex-shrink-0 text-gray-400 group-hover:text-indigo-500 transition-colors" fill="none"
            viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
        </svg>

        <span class="flex-1 text-left" [class.text-gray-900]="displayLabel()" [class.dark:text-white]="displayLabel()"
            [class.text-gray-400]="!displayLabel()">
            {{ displayLabel() ?? placeholder() }}
        </span>

        @if (value() && !disabled()) {
        <button type="button" (click)="$event.stopPropagation(); clearValue()"
            class="p-1 rounded-full text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
        </button>
        }
    </button>

    <!-- Calendar dropdown -->
    @if (open()) {
    <div class="absolute z-[70] mt-2 w-72 rounded-2xl bg-white/90 dark:bg-gray-900/95 backdrop-blur-xl shadow-2xl ring-1 ring-black/5 dark:ring-white/10 p-4 animate-in duration-300"
        [class.left-0]="align() === 'left'" [class.right-0]="align() === 'right'">

        <!-- Month and Year nav -->
        <div class="flex items-center justify-between mb-4">
            <button type="button" (click)="prevMonth()"
                class="p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 dark:text-gray-400 transition-all active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke-width="2.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
                </svg>
            </button>

            <div class="flex flex-col items-center">
                <span class="text-xs font-bold text-indigo-600 dark:text-indigo-400 uppercase tracking-widest">{{
                    viewYear() }}</span>
                <span class="text-sm font-bold text-gray-900 dark:text-white">
                    {{ MONTHS[viewMonth()] }}
                </span>
            </div>

            <button type="button" (click)="nextMonth()"
                class="p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 dark:text-gray-400 transition-all active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke-width="2.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
                </svg>
            </button>
        </div>

        <!-- Weekday headers -->
        <div class="grid grid-cols-7 mb-2">
            @for (wd of WEEKDAYS; track wd) {
            <div
                class="text-center text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-tighter py-1">
                {{ wd }}</div>
            }
        </div>

        <!-- Day grid -->
        <div class="grid grid-cols-7 gap-1">
            @for (day of calendarDays(); track $index) {
            @if (day === null) {
            <div class="h-8"></div>
            } @else {
            <button type="button" (click)="selectDay(day)" [disabled]="isDisabled(day)"
                class="h-8 w-full flex items-center justify-center text-sm transition-all duration-200 rounded-lg focus:outline-none relative group overflow-hidden"
                [class.bg-indigo-600]="isSelected(day)" [class.text-white]="isSelected(day)"
                [class.font-bold]="isSelected(day)" [class.shadow-lg]="isSelected(day)"
                [class.shadow-indigo-200]="isSelected(day)" [class.dark:shadow-none]="isSelected(day)"
                [class.hover:bg-indigo-50]="!isSelected(day) && !isDisabled(day)"
                [class.dark:hover:bg-indigo-900/30]="!isSelected(day) && !isDisabled(day)"
                [class.text-gray-700]="!isSelected(day) && !isDisabled(day)"
                [class.dark:text-gray-300]="!isSelected(day) && !isDisabled(day)" [class.opacity-25]="isDisabled(day)"
                [class.cursor-not-allowed]="isDisabled(day)">

                <!-- Today indicator -->
                @if (isToday(day) && !isSelected(day)) {
                <span class="absolute bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 bg-indigo-500 rounded-full"></span>
                }

                <span class="relative z-10">{{ day.split('-')[2] | number:'1.0-0' }}</span>
            </button>
            }
            }
        </div>

        <!-- Actions -->
        <div class="mt-4 pt-3 border-t border-gray-100 dark:border-gray-800 flex items-center justify-between">
            <button type="button" (click)="selectToday()"
                class="text-xs font-bold text-indigo-600 hover:text-indigo-700 dark:text-indigo-400 px-2 py-1 rounded-lg hover:bg-indigo-50 dark:hover:bg-indigo-900/20 transition-all">
                Hoy
            </button>
            <button type="button" (click)="open.set(false)"
                class="text-xs font-bold text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 px-2 py-1 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800 transition-all">
                Cerrar
            </button>
        </div>
    </div>
    }
</div>
