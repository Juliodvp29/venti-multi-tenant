<div class="p-6 max-w-7xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-700">
    <!-- Tabs Navigation -->
    <div class="mb-6 border-b border-slate-200 dark:border-slate-800">
        <nav class="flex space-x-8" aria-label="Tabs">
            @for (tab of tabs; track tab.id) {
            <button (click)="activeTab.set(tab.id)" [class.border-indigo-500]="activeTab() === tab.id"
                [class.text-indigo-600]="activeTab() === tab.id" [class.dark:text-indigo-400]="activeTab() === tab.id"
                [class.border-transparent]="activeTab() !== tab.id" [class.text-slate-500]="activeTab() !== tab.id"
                [class.dark:text-slate-400]="activeTab() !== tab.id"
                [class.hover:text-slate-700]="activeTab() !== tab.id"
                [class.dark:hover:text-slate-200]="activeTab() !== tab.id"
                [class.hover:border-slate-300]="activeTab() !== tab.id"
                class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition-all duration-200">
                {{ tab.label }}
            </button>
            }
        </nav>
    </div>

    <app-dynamic-table [title]="'Base de Datos de Clientes'"
        [description]="'Gestiona clientes y ve su historial de compras.'" [columns]="columns"
        [data]="filteredCustomers()" [pageSize]="10" [searchPlaceholder]="'Buscar por nombre o correo...'"
        (rowClick)="onCustomerClick($event)"></app-dynamic-table>
</div>
