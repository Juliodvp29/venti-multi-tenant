<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="mb-8 border-b border-gray-100 pb-6">
        <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Mi Cuenta</h1>
        <p class="text-gray-500 mt-2">Gestiona tu información personal y direcciones de envío.</p>
    </div>

    <div class="flex flex-col md:flex-row gap-8">
        <!-- Sidebar -->
        <aside class="w-full md:w-64 flex-shrink-0">
            <nav class="space-y-1">
                <a routerLink="/store/account/direcciones"
                    routerLinkActive="bg-indigo-50/70 text-indigo-700 min-w-full font-semibold border-indigo-600"
                    class="group flex items-center px-4 py-3 text-sm font-medium rounded-xl text-gray-600 hover:text-indigo-700 hover:bg-indigo-50/50 transition-all border-l-4 border-transparent">
                    <svg class="flex-shrink-0 -ml-1 mr-3 h-5 w-5 text-gray-400 group-hover:text-indigo-500"
                        [class.!text-indigo-600]="true" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
                    </svg>
                    Mis Direcciones
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 min-w-0">
            <div class="bg-white rounded-2xl border border-gray-100/80 shadow-sm p-6 sm:p-8 relative overflow-hidden">
                <!-- Decorative element -->
                <div
                    class="absolute top-0 right-0 w-32 h-32 bg-indigo-50/50 rounded-full blur-3xl -mr-16 -mt-16 pointer-events-none">
                </div>
                <router-outlet></router-outlet>
            </div>
        </main>
    </div>
</div>
