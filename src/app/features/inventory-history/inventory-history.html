<div class="space-y-6">
    <div class="flex flex-col gap-2">
        <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">Movimientos de Inventario</h1>
        <p class="text-gray-500 dark:text-gray-400">Historial completo de entradas, salidas y ajustes manuales de stock.
        </p>
    </div>

    <div
        class="bg-white dark:bg-gray-900 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-800 overflow-hidden">
        <app-dynamic-table [title]="''" [data]="movements()" [columns]="columns" [totalItemsOverride]="totalItems()"
            [pageSize]="20" (pageChange)="onPageChange($event)" />
    </div>
</div>
